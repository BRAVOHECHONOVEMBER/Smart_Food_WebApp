<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Account Type</title>

    <link rel="stylesheet" href="/styles/app-pages.css">

</head>

<body>

    <div class="role-selector-container">

	<div class="role-selector-card">

		<div class="role-logo">
			<i class="fas fa-utensils"></i>
			<span>P-GRILLS</span>
		</div>

		<h2>Select Account Type</h2>

		<p>
			Choose how you would like to continue.
		</p>

		<div class="role-options">

			<button id="customerBtn" class="role-btn">
				<i class="fas fa-user"></i>
				<span>Customer Account</span>
				<small>Browse menus and place orders</small>
			</button>

			<button id="vendorBtn" class="role-btn">
				<i class="fas fa-store"></i>
				<span>Vendor Account</span>
				<small>Manage products and sales</small>
			</button>

		</div>

	</div>

    <script type="module" src="./role-selector.js"></script>

</body>

</html>
