<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | 2P Grill</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/app-pages.css">
</head>
<body>
    <header class="header">
        <div class="logo"><i class="fas fa-utensils"></i><span>2P GRILL</span></div>
        <div class="header-actions">
            <a class="vendor-btn" href="/">Home</a>
            <button class="vendor-btn" id="logoutBtn">Logout</button>
        </div>
    </header>
    <main class="page-shell">
        <section class="modal wide">
            <div class="modal-header"><h2><i class="fas fa-credit-card"></i> Checkout</h2></div>
            <div class="modal-body">
                <div class="tabs">
                    <button class="filter-btn active" data-step="delivery">Delivery Details</button>
                    <button class="filter-btn" data-step="summary">Order Summary</button>
                    <button class="filter-btn" data-step="payment">Payment</button>
                    <button class="filter-btn" data-step="success">Success</button>
                </div>
                <form id="checkoutForm">
                    <section class="tab-panel active" id="delivery">
                        <div class="form-grid">
                            <div class="form-group"><label>Full Name</label><input name="fullname" required></div>
                            <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
                            <div class="form-group"><label>Phone</label><input type="tel" name="phone" required></div>
                            <div class="form-group"><label>Delivery Address</label><textarea name="address" rows="3" required></textarea></div>
                            <div class="form-group"><label>Special Instructions</label><textarea name="instructions" rows="3"></textarea></div>
                        </div>
                    </section>
                    <section class="tab-panel" id="summary">
                        <div id="orderSummary" class="panel"></div>
                    </section>
                    <section class="tab-panel" id="payment">
                        <div class="form-group">
                            <label>Payment Method</label>
                            <select name="paymentMethod" required>
                                <option value="Card">Card</option>
                                <option value="Transfer">Transfer</option>
                                <option value="Wallet">Wallet</option>
                            </select>
                        </div>
                    </section>
                    <section class="tab-panel" id="success">
                        <div id="successPanel" class="panel">Complete payment to generate your receipt.</div>
                    </section>
                    <button class="submit-btn" type="submit">Place Order</button>
                </form>
            </div>
        </section>
    </main>
    <div class="toast-container" id="toastContainer"></div>
    <script type="module" src="/frontend/checkout.js"></script>
</body>
</html>
