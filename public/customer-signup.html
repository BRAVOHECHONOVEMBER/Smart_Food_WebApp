<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Signup | 2P Grill</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/app-pages.css">
</head>
<body>
    <header class="header">
        <div class="logo"><i class="fas fa-utensils"></i><span>2P GRILL</span></div>
        <a class="vendor-btn" href="/login.html">Login</a>
    </header>
    <main class="auth-shell">
        <section class="modal">
            <div class="modal-header"><h2><i class="fas fa-user-plus"></i> Customer Signup</h2></div>
            <div class="modal-body">
                <form id="customerSignupForm">
                    <div class="form-group"><label>Full Name</label><input name="fullname" required></div>
                    <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
                    <div class="form-group"><label>Phone</label><input type="tel" name="phone" required></div>
                    <div class="form-group"><label>Password</label><input type="password" name="password" required minlength="6"></div>
                    <div class="form-group"><label>Confirm Password</label><input type="password" name="confirmPassword" required minlength="6"></div>
                    <button class="submit-btn" type="submit">Create Customer Account</button>
                </form>
            </div>
        </section>
    </main>
    <div class="toast-container" id="toastContainer"></div>
    <script type="module" src="/src/frontend/auth.js"></script>
</body>
</html>
