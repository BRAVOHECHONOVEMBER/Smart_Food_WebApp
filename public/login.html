<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | P-GRILLS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/app-pages.css">
</head>
<body>
    <header class="header">
        <div class="logo"><i class="fas fa-utensils"></i><span>P-GRILLS</span></div>
        <div class="header-actions">
            <a class="vendor-btn" href="/customer-signup.html">Customer Signup</a>
            <a class="vendor-btn" href="/vendor-signup.html">Vendor Signup</a>
        </div>
    </header>
    <main class="auth-shell">
        <section class="modal">
            <div class="modal-header">
                <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
            </div>
            <div class="modal-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" required>
                    </div>
                    <button class="submit-btn" type="submit">Login</button>
                </form>
            </div>
        </section>
    </main>
    <div class="toast-container" id="toastContainer"></div>
    <script type="module" src="/frontend/auth.js"></script>
</body>
</html>
